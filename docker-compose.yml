version: '3.8'

services:
  # The Nginx server hosting your Vite React app
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_app
    ports:
      - "3000:80" # Maps port 3000 on your local machine to port 80 in the container
    depends_on:
      - redis
    restart: unless-stopped

  # The Redis Cache instance
  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    # Optional: Configure Redis to persist data to disk (snapshotting)
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: unless-stopped

# Define a persistent volume for Redis so cache survives container restarts
volumes:
  redis_data:
    driver: local